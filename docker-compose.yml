version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: clinic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-clinic_db}
      MYSQL_USER: ${DB_USER:-clinic_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clinic_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic-backend
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-clinic_user}:${DB_PASSWORD:-clinic_password}@mysql:3306/${DB_NAME:-clinic_db}
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clinic-network
    volumes:
      - ./backend:/app
    command: gunicorn --bind 0.0.0.0:5000 app:app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinic-frontend
    environment:
      VITE_API_URL: http://backend:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - clinic-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Nginx (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: clinic-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - clinic-network
    profiles:
      - production

volumes:
  mysql_data:

networks:
  clinic-network:
    driver: bridge
